version: '3.8'

# ============================================================
# 阿克苏苹果区块链溯源系统 - Docker Compose 部署配置
# 快速启动: docker compose up -d
# 完整启动（含IPFS）: docker compose --profile full up -d
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: agri-trace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: agri_trace
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: agri-trace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ipfs:
    image: ipfs/kubo:latest
    container_name: agri-trace-ipfs
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8090:8080"
    volumes:
      - ipfs_data:/data/ipfs
    profiles:
      - full

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agri-trace-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./backend/config/config.yaml:/app/config/config.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: nginx:alpine
    container_name: agri-trace-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  ipfs_data:
    driver: local
